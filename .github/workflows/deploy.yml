name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Must match the local Node major: a lockfile written by npm 11 is rejected by npm 10.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Git hooks are a local-development tool; installing them in CI only adds a failure mode.
      - run: npm ci
        env:
          HUSKY: 0

      - run: npm run lint
      - run: npm run type-check

      - run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /TamirlanOS

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
